<svg xmlns="http://www.w3.org/2000/svg" lang="zh-CN" viewBox="0 0 1440 520" role="img" aria-labelledby="title desc">
  <title id="title">Toworkboard</title>
  <desc id="desc">面向 Obsidian 的本地优先工作台，汇集笔记、只读邮箱、任务与工程信号。</desc>
  <rect width="1440" height="520" fill="#F3F5F3"/>
  <path d="M0 72H1440M0 448H1440" stroke="#D6DDD6"/>

  <g transform="translate(70 78)">
    <g fill="#183C2B">
      <rect x="8" y="8" width="160" height="40" rx="20"/>
      <rect x="68" y="38" width="40" height="142" rx="8"/>
    </g>
    <path d="M206 18V170" stroke="#4E7D5B" stroke-width="3"/>
    <g fill="#F3F5F3" stroke="#4E7D5B" stroke-width="4">
      <circle cx="206" cy="24" r="9"/>
      <circle cx="206" cy="72" r="9"/>
      <circle cx="206" cy="120" r="9"/>
      <circle cx="206" cy="168" r="9"/>
    </g>
  </g>

  <g fill="#17201A" font-family="Inter, PingFang SC, Microsoft YaHei, ui-sans-serif, system-ui, sans-serif">
    <text x="70" y="368" font-size="60" font-weight="800" letter-spacing="-1.8">TOWORKBOARD</text>
    <text x="72" y="418" fill="#59655D" font-size="17">一处安静的本地知识工作台</text>
  </g>

  <g transform="translate(650 58)" font-family="Inter, PingFang SC, Microsoft YaHei, ui-sans-serif, system-ui, sans-serif">
    <rect width="710" height="404" rx="16" fill="#FBFCFA" stroke="#D6DDD6" stroke-width="2"/>
    <g transform="translate(30 28)">
      <text fill="#59655D" font-size="11" font-weight="700" letter-spacing="1.2">本地优先的 OBSIDIAN 工作台 · TOTORO</text>
      <text y="42" fill="#17201A" font-size="28" font-weight="800">找到写过的内容，看见此刻重要的事。</text>

      <g transform="translate(0 68)">
        <rect width="650" height="48" rx="8" fill="#F3F5F3" stroke="#D6DDD6"/>
        <circle cx="20" cy="24" r="6" fill="none" stroke="#4E7D5B" stroke-width="2"/>
        <path d="M24 28l5 5" stroke="#4E7D5B" stroke-width="2" stroke-linecap="round"/>
        <text x="42" y="29" fill="#59655D" font-size="13">搜索标题、路径、标签与笔记正文…</text>
        <rect x="595" y="13" width="38" height="22" rx="5" fill="#FBFCFA" stroke="#D6DDD6"/>
        <text x="614" y="28" text-anchor="middle" fill="#59655D" font-size="9" font-family="ui-monospace, monospace">⌘ K</text>
      </g>

      <g transform="translate(0 142)">
        <text fill="#17201A" font-size="16" font-weight="800">常用笔记</text>
        <text x="650" text-anchor="end" fill="#59655D" font-size="10" letter-spacing="1">最近 7 天</text>
        <path d="M0 20H650M0 88H650M0 156H650" stroke="#D6DDD6"/>
        <g font-size="13">
          <text x="0" y="51" fill="#4E7D5B" font-family="ui-monospace, monospace" font-size="10">01</text>
          <text x="40" y="51" fill="#17201A" font-weight="700">学习—Spring Boot 与 FastAPI 对照</text>
          <text x="40" y="70" fill="#59655D" font-size="10">学习 / 后端 · 2 小时前</text>
          <text x="620" y="51" text-anchor="end" fill="#183C2B" font-family="ui-monospace, monospace">12</text>
          <text x="0" y="119" fill="#4E7D5B" font-family="ui-monospace, monospace" font-size="10">02</text>
          <text x="40" y="119" fill="#17201A" font-weight="700">复盘—API 限流与容灾设计</text>
          <text x="40" y="138" fill="#59655D" font-size="10">项目 / 架构 · 昨天</text>
          <text x="620" y="119" text-anchor="end" fill="#183C2B" font-family="ui-monospace, monospace">8</text>
        </g>
      </g>

      <g transform="translate(0 322)">
        <rect width="650" height="44" rx="8" fill="#E9EEE9"/>
        <g font-size="11" font-weight="700">
          <circle cx="23" cy="22" r="5" fill="#4E7D5B"/>
          <text x="38" y="27" fill="#17201A">笔记</text>
          <circle cx="179" cy="22" r="5" fill="#4E7D5B"/>
          <text x="194" y="27" fill="#17201A">邮箱</text>
          <circle cx="326" cy="22" r="5" fill="#4E7D5B"/>
          <text x="341" y="27" fill="#17201A">任务</text>
          <circle cx="480" cy="22" r="5" fill="#7FA0A0"/>
          <text x="495" y="27" fill="#17201A">工程信号</text>
        </g>
      </g>
    </g>
  </g>
</svg>
